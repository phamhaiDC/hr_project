<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR System — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #374151;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      text-align: center;
      max-width: 22rem;
      width: 100%;
    }
    .icon-wrap {
      width: 5rem;
      height: 5rem;
      border-radius: 50%;
      background: #e0e7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon-wrap svg { width: 2.5rem; height: 2.5rem; color: #4f46e5; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #111827; }
    p { color: #6b7280; font-size: 0.9375rem; line-height: 1.6; margin-bottom: 1.75rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #4f46e5;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.625rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background 0.15s;
    }
    .btn:hover { background: #4338ca; }
    .note { margin-top: 1rem; font-size: 0.8125rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 13a1 1 0 100-2 1 1 0 000 2zm0 0v2m-6.364 3.536a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>
      No internet connection detected.<br/>
      Check your Wi-Fi or mobile data and try again.
    </p>
    <button class="btn" onclick="window.location.reload()">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Try Again
    </button>
    <p class="note">Your last session may still be accessible once reconnected.</p>
  </div>
</body>
</html>
