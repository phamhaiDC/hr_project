<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <title>HR System — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #374151;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      text-align: center;
      max-width: 22rem;
      width: 100%;
    }

    .icon-wrap {
      width: 5rem;
      height: 5rem;
      border-radius: 50%;
      background: #e0e7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon-wrap svg { width: 2.5rem; height: 2.5rem; color: #4f46e5; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #111827; }

    p {
      color: #6b7280;
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #4f46e5;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.625rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { background: #4338ca; }
    .btn:active { background: #3730a3; transform: scale(0.98); }
    .btn svg { flex-shrink: 0; }

    .note { margin-top: 1rem; font-size: 0.8125rem; color: #9ca3af; }

    /* Pulse animation on the icon to indicate "trying" state */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 2s ease-in-out infinite; }

    /* Status indicator */
    #status {
      display: none;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <!-- Wi-Fi off icon -->
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 13a1 1 0 100-2 1 1 0 000 2zm0 0v2m-6.364 3.536a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072"/>
      </svg>
    </div>

    <h1>You're offline</h1>
    <p>
      No internet connection detected.<br/>
      Check your Wi-Fi or mobile data and try again.
    </p>

    <button class="btn" id="retryBtn" onclick="handleRetry()">
      <svg id="retryIcon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Try Again
    </button>

    <p id="status"></p>
    <p class="note">Your last session will resume once you're reconnected.</p>
  </div>

  <script>
    // Auto-reload when the browser detects connectivity is restored.
    window.addEventListener('online', function () {
      document.getElementById('status').style.display = 'block';
      document.getElementById('status').textContent = 'Connection restored — reloading…';
      setTimeout(function () { window.location.reload(); }, 800);
    });

    function handleRetry() {
      var btn = document.getElementById('retryBtn');
      var icon = document.getElementById('retryIcon');
      btn.disabled = true;
      btn.textContent = 'Checking…';
      icon.classList.add('pulse');

      // Give the network a moment, then try reloading.
      setTimeout(function () { window.location.reload(); }, 1200);
    }
  </script>
</body>
</html>
