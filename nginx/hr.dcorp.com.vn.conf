# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for hr.dcorp.com.vn
#
# Architecture:
#   Internet → Cloudflare (HTTPS) → Nginx (HTTP/80 or HTTPS/443) → Next.js (127.0.0.1:3000)
#
# Cloudflare handles the public TLS cert for hr.dcorp.com.vn.
# Set Cloudflare SSL mode to "Full" or "Full (strict)".
#
# Install:
#   sudo cp hr.dcorp.com.vn.conf /etc/nginx/sites-available/hr.dcorp.com.vn
#   sudo ln -s /etc/nginx/sites-available/hr.dcorp.com.vn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream: Next.js production server ─────────────────────────────────────
upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP (port 80) ───────────────────────────────────────────────────────────
# Cloudflare always sends HTTPS to the origin, but keep port 80 for:
#   - Let's Encrypt / Cloudflare cert renewal HTTP challenges
#   - Direct LAN access without TLS
server {
    listen 80;
    listen [::]:80;
    server_name hr.dcorp.com.vn;

    # Allow Cloudflare health-checks and ACME challenges through
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS (handled by Cloudflare anyway)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (port 443) ─────────────────────────────────────────────────────────
# Option A — Cloudflare "Full" mode: Cloudflare sends plain HTTP to port 80.
#            In that case you can remove this block and keep only port 80.
#
# Option B — Cloudflare "Full (strict)" or direct HTTPS to origin:
#            Provide a cert here (Cloudflare Origin cert or Let's Encrypt).
#
# Uncomment and fill in cert paths when using Option B:
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name hr.dcorp.com.vn;
#
#     ssl_certificate     /etc/ssl/certs/hr.dcorp.com.vn.pem;
#     ssl_certificate_key /etc/ssl/private/hr.dcorp.com.vn-key.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;
#     ssl_session_cache   shared:SSL:10m;
#     ssl_session_timeout 1d;
#
#     include /etc/nginx/snippets/proxy-nextjs.conf;
# }

# ── Shared proxy config (used by port 80 direct or port 443) ─────────────────
# When Cloudflare SSL mode = "Flexible", Cloudflare hits port 80 directly.
# In that case this single server block handles everything:
server {
    listen 80;
    listen [::]:80;
    server_name hr.dcorp.com.vn;

    # Remove duplicate listen if you use the redirect block above.
    # For Cloudflare Flexible mode, comment out the redirect server block
    # and keep only this one.

    client_max_body_size 20M;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # HSTS is set by Cloudflare — do not set it here to avoid double-header.

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/hr.dcorp.com.vn.access.log;
    error_log  /var/log/nginx/hr.dcorp.com.vn.error.log;

    # ── Static Next.js build assets (_next/static) ──────────────────────────
    # These are content-hashed by Next.js — safe to cache aggressively.
    location /_next/static/ {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        expires            1y;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── PWA assets ──────────────────────────────────────────────────────────
    location = /sw.js {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        add_header         Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.json {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        add_header         Cache-Control "public, max-age=86400";
        add_header         Content-Type  "application/manifest+json";
    }

    # ── All other requests → Next.js ─────────────────────────────────────────
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR in dev / future WS features)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Pass real client info through Cloudflare → Nginx → Next.js
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts suitable for SSR pages
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for SSR streaming responses
        proxy_buffering    off;
        proxy_cache        off;
    }
}
